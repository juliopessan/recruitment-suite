services:
  - type: web
    name: recruitment-suite-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EXA_API_KEY
        sync: false # set the value in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.12.0
